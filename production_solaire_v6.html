<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Solaire V6</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Solaire">
    <meta name="theme-color" content="#ff9500">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif; background:#f5f5f7; min-height:100vh; }

        /* SYNC BANNER */
        .sync-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:8px 16px; font-size:0.8em; font-weight:500; transition:all 0.3s; }
        .sync-bar.synced { background:#d1fae5; color:#065f46; }
        .sync-bar.syncing { background:#fef3c7; color:#92400e; }
        .sync-bar.error { background:#fee2e2; color:#991b1b; }
        .sync-dot { width:8px; height:8px; border-radius:50%; background:currentColor; }
        .sync-dot.pulse { animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .hero { background:linear-gradient(160deg,#ff9500 0%,#ffcc00 100%); padding:36px 20px 55px; text-align:center; position:relative; overflow:hidden; }
        .hero::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 60% 40%,rgba(255,255,255,0.15) 0%,transparent 60%); pointer-events:none; }
        .hero-icon { font-size:3.2em; margin-bottom:8px; display:block; }
        .hero h1 { color:white; font-size:clamp(1.5em,5vw,2.6em); font-weight:700; letter-spacing:-0.03em; text-shadow:0 2px 12px rgba(0,0,0,0.1); }
        .hero .subtitle { color:rgba(255,255,255,0.85); font-size:0.95em; margin-top:5px; }

        .container { max-width:1200px; margin:-10px auto 0; padding:0 16px 80px; }
        .card { background:white; border-radius:18px; padding:20px; margin-bottom:20px; box-shadow:0 2px 16px rgba(0,0,0,0.07); }
        .card-title { font-size:1.1em; font-weight:700; color:#1d1d1f; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid #f2f2f7; }

        .toggle-buttons { display:flex; gap:8px; flex-wrap:wrap; }
        .toggle-btn { flex:1; min-width:110px; padding:10px 12px; border-radius:10px; border:1.5px solid #e0e0e0; background:#f5f5f7; color:#1d1d1f; font-size:0.82em; font-weight:500; cursor:pointer; transition:all 0.2s; text-align:center; }
        .toggle-btn.active { background:#ff9500; border-color:#ff9500; color:white; box-shadow:0 2px 10px rgba(255,149,0,0.3); }
        .toggle-result { margin-top:14px; padding:14px 16px; background:#fff9ec; border-radius:10px; border-left:4px solid #ff9500; font-size:0.92em; color:#1d1d1f; min-height:46px; display:flex; align-items:center; flex-wrap:wrap; gap:6px; }

        .contrat-inputs { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .contrat-inputs label { font-size:0.85em; color:#6e6e73; font-weight:500; }
        .contrat-inputs input[type=date] { padding:10px 14px; border:1.5px solid #e0e0e0; border-radius:10px; font-size:0.9em; background:#f5f5f7; color:#1d1d1f; outline:none; }
        .contrat-inputs input[type=date]:focus { border-color:#0071e3; }
        .calc-btn { background:#0071e3; color:white; border:none; padding:10px 20px; border-radius:10px; font-size:0.9em; font-weight:500; cursor:pointer; }
        .contrat-results { margin-top:14px; display:none; }
        .contrat-year-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-radius:10px; margin-bottom:8px; background:#f5f5f7; font-size:0.9em; }
        .contrat-year-item.current { background:linear-gradient(90deg,#fff5e0,#fff9ec); border-left:4px solid #ff9500; font-weight:600; }
        .contrat-year-value { color:#ff9500; font-weight:700; }

        canvas { max-height:380px; }

        .table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
        .table-container { overflow-x:auto; -webkit-overflow-scrolling:touch; }
        table { width:100%; border-collapse:collapse; min-width:600px; }
        th { background:#f5f5f7; color:#6e6e73; padding:12px 10px; text-align:center; font-weight:600; font-size:0.78em; text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid #e5e5ea; position:sticky; top:0; z-index:10; }
        td { padding:10px 8px; text-align:center; border-bottom:1px solid #f2f2f7; }
        tbody tr:nth-child(even) { background:#fafafa; }
        tbody tr:hover { background:#fff9ec; }
        .month-cell { font-weight:600; color:#1d1d1f; text-align:left; padding-left:16px; font-size:0.9em; white-space:nowrap; }
        .total-row { background:#fff9ec !important; }
        .total-row td { color:#c07000; font-weight:700; font-size:0.9em; }
        .average-row { background:#edf5ff !important; }
        .average-row td { color:#0055b3; font-weight:700; font-size:0.9em; }

        input[type=number] { width:70px; padding:7px 4px; border:1.5px solid transparent; border-radius:8px; text-align:center; font-size:0.88em; background:transparent; transition:all 0.2s; -moz-appearance:textfield; }
        input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number]:focus { outline:none; border-color:#0071e3; background:white; box-shadow:0 0 0 3px rgba(0,113,227,0.1); }
        input[type=number].saved { border-color:#30d158; background:#f0fff4; }

        .btn-row { display:flex; gap:8px; flex-wrap:wrap; }
        .action-btn { background:#0071e3; color:white; border:none; padding:10px 18px; border-radius:10px; font-size:0.85em; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .action-btn:hover { background:#0077ed; }
        .del-btn { background:#ff3b30; color:white; border:none; padding:10px 18px; border-radius:10px; font-size:0.85em; font-weight:500; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
        .del-btn:hover { background:#ff2d20; }

        /* CONFIG FIREBASE BANNER */
        .config-banner { background:#fff3cd; border:1.5px solid #ffcc00; border-radius:14px; padding:16px 20px; margin-bottom:20px; font-size:0.9em; color:#856404; }
        .config-banner strong { display:block; margin-bottom:6px; font-size:1em; }
        .config-banner code { background:#fff; padding:2px 6px; border-radius:4px; font-size:0.85em; }

        @media(max-width:600px) {
            .hero { padding:28px 16px 48px; }
            .toggle-btn { min-width:80px; font-size:0.78em; padding:8px 8px; }
            input[type=number] { width:55px; }
        }
    </style>
</head>
<body>

<!-- SYNC STATUS BAR -->
<div class="sync-bar syncing" id="syncBar">
    <div class="sync-dot pulse" id="syncDot"></div>
    <span id="syncText">Connexion Firebase...</span>
</div>

<div class="hero">
    <span class="hero-icon">&#9728;&#65039;</span>
    <h1>Production d&#39;&Eacute;nergie Solaire</h1>
    <p class="subtitle">Suivi mensuel synchronis&#233; en temps r&#233;el</p>
</div>

<div class="container">



    <!-- STATS TOGGLE -->
    <div class="card">
        <div class="card-title">&#128269; Statistiques avanc&#233;es</div>
        <div class="toggle-buttons">
            <button class="toggle-btn active" id="btn-month" onclick="setToggle('month')">&#127765; Meilleur Mois</button>
            <button class="toggle-btn" id="btn-avg" onclick="setToggle('avg')">&#128200; Meilleure Moyenne</button>
            <button class="toggle-btn" id="btn-year" onclick="setToggle('year')">&#127942; Meilleure Ann&#233;e</button>
            <button class="toggle-btn" id="btn-monthavg" onclick="setToggle('monthavg')">&#128197; Moy. par Mois</button>
        </div>
        <div class="toggle-result" id="toggleResult">Chargement des donn&#233;es...</div>
    </div>

    <!-- CONTRAT -->
    <div class="card">
        <div class="card-title">&#128203; Ann&#233;e Anniversaire de Contrat</div>
        <div class="contrat-inputs">
            <label>Date de d&#233;but :</label>
            <input type="date" id="contratDate" />
            <button class="calc-btn" onclick="calcContrat()">Calculer</button>
        </div>
        <div class="contrat-results" id="contratResults"></div>
    </div>

    <!-- CHART -->
    <div class="card">
        <div class="card-title">&#128200; &#201;volution mensuelle par ann&#233;e</div>
        <canvas id="productionChart"></canvas>
    </div>

    <!-- TABLE -->
    <div class="card">
        <div class="table-header">
            <div class="card-title" style="margin:0;border:none;padding:0">&#9728;&#65039; Donn&#233;es Mensuelles</div>
            <div class="btn-row">
                <button class="action-btn" id="addYearBtn">&#65291; Ann&#233;e</button>
                <button class="del-btn" id="delYearBtn">&#8722; Ann&#233;e</button>
            </div>
        </div>
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr id="headerRow">
                        <th>Mois</th>
                        <th>2018</th><th>2019</th><th>2020</th><th>2021</th><th>2022</th>
                        <th>2023</th><th>2024</th><th>2025</th><th>2026</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
// ============================================================
// 🔥 FIREBASE CONFIG — REMPLACEZ CES VALEURS PAR LES VÔTRES
// ============================================================
var firebaseConfig = {
    apiKey: "AIzaSyBEWo-9sH-kmEGDwxEbyofH6QCRujxP_nw",
    authDomain: "solaire-production.firebaseapp.com",
    databaseURL: "https://solaire-production-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "solaire-production",
    storageBucket: "solaire-production.firebasestorage.app",
    messagingSenderId: "207701482412",
    appId: "1:207701482412:web:af61160972b1db5d467809",
    measurementId: "G-RCQBBXLRRE"
};
// ============================================================

var firebaseReady = false;
var db = null;

// Données par défaut
var defaultValues = [
    ['','48.7','65.4','40.4','57.4','34.9','57','64.6','36.9'],
    ['','172.1','109.4','140.4','114.1','119.2','78.2','62.8','67.9'],
    ['','223.5','246.9','237.3','247.4','168.4','172.3','220.7',''],
    ['','285.4','384.4','316.2','283.3','248.7','242.5','285.3',''],
    ['','366.9','419.2','321.3','378.7','357.6','289','368.6',''],
    ['392.7','416.9','358.1','355.5','376.6','433.8','318.5','351.5',''],
    ['433.8','416','407.4','314.1','428.2','','332.4','308.4',''],
    ['348.3','338.1','323.3','276.4','357','','312.6','294.8',''],
    ['288.1','246.1','245.1','258.1','219.6','','186.2','164',''],
    ['185.7','129','58.8','156.8','150.8','','112','124.7',''],
    ['91.6','64.7','97.1','53.7','69.2','','45.2','69.8',''],
    ['39.1','58.8','39.3','34.8','34.9','36.3','37.1','54.7','']
];

var appData = {
    months: ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'],
    years: ['2018','2019','2020','2021','2022','2023','2024','2025','2026'],
    values: defaultValues.map(function(row){ return row.slice(); })
};

var colors = ['#ff9500','#0071e3','#30d158','#bf5af2','#ff375f','#5e5ce6','#00c7be','#ff9f0a','#8e8e93','#32ade6'];
var currentToggle = 'month';
var saveTimeout = null;

// Init Firebase
function initFirebase() {
    try {
        if(firebaseConfig.apiKey === 'VOTRE_API_KEY') {
            setSyncStatus('error', '&#9888; Firebase non configuré — mode local uniquement');
            loadFromLocalStorage();
            return;
        }
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        setSyncStatus('syncing', 'Connexion...');

        db.ref('solaire').on('value', function(snapshot) {
            var saved = snapshot.val();
            if(saved && saved.years && saved.values) {
                appData.years = saved.years;
                appData.values = saved.values;
                rebuildHeaderYears();
            } else {
                // Premiere utilisation Firebase : on pousse les donnees par defaut
                appData.years = ['2018','2019','2020','2021','2022','2023','2024','2025','2026'];
                appData.values = defaultValues.map(function(row){ return row.slice(); });
                rebuildHeaderYears();
                db.ref('solaire').set({ years: appData.years, values: appData.values });
            }
            setSyncStatus('synced', 'Synchronisé &#10003;');
            firebaseReady = true;
            buildTable();
            updateChart();
            updateToggle();
        }, function(error) {
            setSyncStatus('error', '&#9888; Erreur Firebase — mode local');
            loadFromLocalStorage();
        });
    } catch(e) {
        setSyncStatus('error', '&#9888; Erreur Firebase — mode local');
        loadFromLocalStorage();
    }
}

function saveToFirebase() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(function() {
        setSyncStatus('syncing', 'Sauvegarde...');
        if(db) {
            db.ref('solaire').set({
                years: appData.years,
                values: appData.values
            }).then(function() {
                setSyncStatus('synced', 'Synchronisé &#10003;');
            }).catch(function() {
                setSyncStatus('error', '&#9888; Erreur de sauvegarde');
            });
        } else {
            saveToLocalStorage();
            setSyncStatus('error', 'Sauvegardé en local uniquement');
        }
    }, 800);
}

function saveToLocalStorage() {
    localStorage.setItem('solaire_years', JSON.stringify(appData.years));
    localStorage.setItem('solaire_values', JSON.stringify(appData.values));
}

function loadFromLocalStorage() {
    var y = localStorage.getItem('solaire_years');
    var v = localStorage.getItem('solaire_values');
    if(y && v) {
        appData.years = JSON.parse(y);
        appData.values = JSON.parse(v);
        rebuildHeaderYears();
    } else {
        // Aucune donnee locale -> on charge les donnees par defaut
        appData.years = ['2018','2019','2020','2021','2022','2023','2024','2025','2026'];
        appData.values = defaultValues.map(function(row){ return row.slice(); });
        rebuildHeaderYears();
    }
    buildTable(); updateChart(); updateToggle();
}

function setSyncStatus(type, msg) {
    var bar = document.getElementById('syncBar');
    var dot = document.getElementById('syncDot');
    var txt = document.getElementById('syncText');
    bar.className = 'sync-bar ' + type;
    dot.className = 'sync-dot' + (type === 'syncing' ? ' pulse' : '');
    txt.innerHTML = msg;
}

function rebuildHeaderYears() {
    var row = document.getElementById('headerRow');
    while(row.children.length > 1) row.removeChild(row.lastChild);
    appData.years.forEach(function(yr) {
        var th = document.createElement('th');
        th.textContent = yr;
        row.appendChild(th);
    });
}

// CALCULS
function calcYearTotal(yi) {
    var t=0,has=false;
    appData.values.forEach(function(m){ var v=parseFloat(m[yi]); if(!isNaN(v)&&v>0){t+=v;has=true;} });
    return has?t:0;
}
function calcYearAvg(yi) {
    var t=0,c=0;
    appData.values.forEach(function(m){ var v=parseFloat(m[yi]); if(!isNaN(v)&&v>0){t+=v;c++;} });
    return c>0?t/c:0;
}
function calcMonthAvg(mi) {
    var t=0,c=0;
    appData.years.forEach(function(_,j){ var v=parseFloat(appData.values[mi][j]); if(!isNaN(v)&&v>0){t+=v;c++;} });
    return c>0?t/c:0;
}

// TABLE
function buildTable() {
    var tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    appData.months.forEach(function(month,i) {
        var row = document.createElement('tr');
        var html = '<td class="month-cell">'+month+'</td>';
        appData.years.forEach(function(year,j) {
            var v = appData.values[i][j]||'';
            html += '<td><input type="number" step="0.1" value="'+v+'" data-month="'+i+'" data-year="'+j+'" placeholder="-"></td>';
        });
        row.innerHTML = html;
        tbody.appendChild(row);
    });

    var sep = document.createElement('tr');
    sep.innerHTML = '<td colspan="'+(appData.years.length+1)+'" style="height:12px;border:none;background:#f5f5f7;"></td>';
    tbody.appendChild(sep);

    var totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    var th = '<td class="month-cell">Total annuel</td>';
    appData.years.forEach(function(_,j){ var t=calcYearTotal(j); th+='<td>'+(t>0?t.toFixed(1):'-')+'</td>'; });
    totalRow.innerHTML = th;
    tbody.appendChild(totalRow);

    var avgRow = document.createElement('tr');
    avgRow.className = 'average-row';
    var ah = '<td class="month-cell">Moy. mensuelle</td>';
    appData.years.forEach(function(_,j){ var a=calcYearAvg(j); ah+='<td>'+(a>0?a.toFixed(1):'-')+'</td>'; });
    avgRow.innerHTML = ah;
    tbody.appendChild(avgRow);

    document.querySelectorAll('input[type=number]').forEach(function(input) {
        input.addEventListener('change', function() {
            var mi = +this.dataset.month;
            var yi = +this.dataset.year;
            appData.values[mi][yi] = this.value;
            var inp = this;
            inp.classList.add('saved');
            setTimeout(function(){ inp.classList.remove('saved'); }, 1500);
            updateChart(); updateTotals(); updateToggle();
            saveToFirebase();
        });
    });
}

function updateTotals() {
    var tc = document.querySelectorAll('.total-row td');
    var ac = document.querySelectorAll('.average-row td');
    appData.years.forEach(function(_,j) {
        var t=calcYearTotal(j); tc[j+1].textContent = t>0?t.toFixed(1):'-';
        var a=calcYearAvg(j); ac[j+1].textContent = a>0?a.toFixed(1):'-';
    });
}

function setToggle(type) {
    currentToggle = type;
    ['month','avg','year','monthavg'].forEach(function(t){
        var btn = document.getElementById('btn-'+t);
        if(btn) btn.classList.toggle('active', t===type);
    });
    updateToggle();
}

function updateToggle() {
    var el = document.getElementById('toggleResult');
    if(currentToggle === 'month') {
        var max=0,name='-',yr='-';
        appData.values.forEach(function(mv,i){ mv.forEach(function(v,j){ var n=parseFloat(v); if(!isNaN(n)&&n>max){max=n;name=appData.months[i];yr=appData.years[j];} }); });
        el.innerHTML = 'Meilleur mois : <strong>'+name+'</strong> en <strong>'+yr+'</strong> &mdash; <strong style="color:#ff9500">'+max.toFixed(1)+' kWh</strong>';
    } else if(currentToggle === 'avg') {
        var maxAvg=0,bestMonth='-';
        appData.months.forEach(function(month,i){ var avg=calcMonthAvg(i); if(avg>maxAvg){maxAvg=avg;bestMonth=month;} });
        el.innerHTML = 'Meilleure moyenne : <strong>'+bestMonth+'</strong> &mdash; <strong style="color:#ff9500">'+maxAvg.toFixed(1)+' kWh</strong> de moyenne';
    } else if(currentToggle === 'year') {
        var maxT=0,bestYr='-';
        appData.years.forEach(function(yr,j){ var t=calcYearTotal(j); if(t>maxT){maxT=t;bestYr=yr;} });
        el.innerHTML = 'Meilleure année : <strong>'+bestYr+'</strong> &mdash; <strong style="color:#ff9500">'+maxT.toFixed(1)+' kWh</strong>';
    } else {
        var rows=appData.months.map(function(month,i){ return {name:month,avg:calcMonthAvg(i)}; });
        rows.sort(function(a,b){ return b.avg-a.avg; });
        var html='<div style="display:flex;flex-wrap:wrap;gap:8px;width:100%">';
        rows.forEach(function(r,idx){
            var op=Math.max(0.15,1-idx*0.08);
            html+='<span style="background:rgba(255,149,0,'+op+');color:'+(idx<5?'white':'#1d1d1f')+';padding:5px 12px;border-radius:8px;font-size:0.85em;font-weight:500">'+r.name+' : '+r.avg.toFixed(1)+' kWh</span>';
        });
        html+='</div>';
        el.innerHTML=html;
    }
}

function calcContrat() {
    var dateInput = document.getElementById('contratDate').value;
    if(!dateInput) return;
    var start=new Date(dateInput);
    var startDay=start.getDate(), startMonth=start.getMonth(), startYear=start.getFullYear();
    var currentYear=new Date().getFullYear();
    var resultsDiv=document.getElementById('contratResults');
    resultsDiv.style.display='block';
    var html='';
    for(var cy=startYear; cy<=currentYear; cy++) {
        var total=0,hasAny=false;
        for(var m=0; m<12; m++) {
            var monthIdx=(startMonth+m)%12;
            var yearVal=(startMonth+m)<12?cy:cy+1;
            var yIdx=appData.years.indexOf(yearVal.toString());
            if(yIdx>=0){ var v=parseFloat(appData.values[monthIdx][yIdx]); if(!isNaN(v)&&v>0){total+=v;hasAny=true;} }
        }
        var d=String(startDay).padStart(2,'0'), mo=String(startMonth+1).padStart(2,'0');
        var label=d+'/'+mo+'/'+cy+' → '+d+'/'+mo+'/'+(cy+1);
        var isCurrent=(cy===currentYear-1);
        html+='<div class="contrat-year-item'+(isCurrent?' current':'')+'"><span>'+label+'</span><span class="contrat-year-value">'+(hasAny?total.toFixed(1)+' kWh':'&#8212; incomplet')+'</span></div>';
    }
    resultsDiv.innerHTML=html;
}

// CHART
var ctx=document.getElementById('productionChart').getContext('2d');
var chart=new Chart(ctx,{
    type:'line',
    data:{ labels:appData.months, datasets:[] },
    options:{
        responsive:true, maintainAspectRatio:true,
        plugins:{
            legend:{ position:'top', labels:{ font:{size:11}, padding:12, usePointStyle:true } },
            tooltip:{ callbacks:{ label:function(c){ return c.dataset.label+': '+c.parsed.y+' kWh'; } } }
        },
        scales:{
            y:{ beginAtZero:true, grid:{color:'rgba(0,0,0,0.04)'}, ticks:{color:'#6e6e73',font:{size:11}}, title:{display:true,text:'kWh',color:'#6e6e73'} },
            x:{ grid:{display:false}, ticks:{color:'#6e6e73',font:{size:11}} }
        }
    }
});

function updateChart() {
    chart.data.datasets=appData.years.map(function(yr,i){
        return {
            label:yr,
            data:appData.values.map(function(mv){ var v=parseFloat(mv[i]); return isNaN(v)?null:v; }),
            borderColor:colors[i%colors.length],
            backgroundColor:colors[i%colors.length]+'20',
            borderWidth:2.5, tension:0.4, pointRadius:3, pointHoverRadius:6, spanGaps:false
        };
    });
    chart.update();
}

// ADD / DELETE YEAR
document.getElementById('addYearBtn').addEventListener('click',function(){
    var newYear=(parseInt(appData.years[appData.years.length-1])+1).toString();
    appData.years.push(newYear);
    appData.values.forEach(function(mv){ mv.push(''); });
    var th=document.createElement('th'); th.textContent=newYear;
    document.getElementById('headerRow').appendChild(th);
    buildTable(); updateChart(); updateToggle();
    saveToFirebase();
});

document.getElementById('delYearBtn').addEventListener('click',function(){
    if(appData.years.length<=1){ alert('Impossible de supprimer la dernière année.'); return; }
    if(!confirm('Supprimer l'année '+appData.years[appData.years.length-1]+' ?')) return;
    appData.years.pop();
    appData.values.forEach(function(mv){ mv.pop(); });
    var headerRow=document.getElementById('headerRow');
    headerRow.removeChild(headerRow.lastElementChild);
    buildTable(); updateChart(); updateToggle();
    saveToFirebase();
});

// START
initFirebase();
</script>
</body>
</html>
